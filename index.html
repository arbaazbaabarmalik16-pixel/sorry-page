<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Floating hearts */
.heart {
    position: absolute;
    color: rgba(255, 0, 85, 0.7);
    font-size: 20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}

/* Card */
.container {
    position: relative;
    z-index: 2;
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 400px;
}

/* Button */
button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 25px;
    background: #ff6b81;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff4757;
}

/* Message */
#message {
    display: none;
    margin-top: 20px;
    font-size: 18px;
    line-height: 1.6;
}

/* Glow */
.container::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    background: linear-gradient(45deg, #ff6b81, #ffa502, #ff6b81);
    z-index: -1;
    filter: blur(10px);
    opacity: 0.6;
}
</style>
</head>

<body>

<script>
for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 5) + "s";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);
}
</script>

<div class="container">
    <h2>Hey... 💭</h2>
    <p>I have something to tell you...</p>

    <button id="revealBtn" onclick="showMessage()">Click to find out my feelings</button>

    <div id="message">
        <p>❤️</p>
        <p>
            I’m really sorry...<br><br>
            Not just for what happened, but for how it made you feel.<br><br>
            You matter to me more than I can explain,<br>
            and I never wanted to hurt you.<br><br>
            I hope you can forgive me… 💖
        </p>
    </div>
</div>

<script>
function showMessage() {
    document.getElementById("message").style.display = "block";
    document.getElementById("revealBtn").style.display = "none"; // hides button
}
</script>

</body>
</html>
